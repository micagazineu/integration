name: 'Executar Jenkinsfile no GitHub Actions'

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite rodar de forma manual clicando em "Run workflow"

jobs:
  run-jenkinsfile:
    # IMPORTANTE: Como seu runner local já possui o Docker instalado e configurado,
    # rodamos como self-hosted para maior velocidade e compatibilidade de rede
    runs-on: self-hosted

    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v4

      - name: 2. Rodar Jenkinsfile via Imagem Pré-Compilada (Sem Build)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            ghcr.io/jenkinsci/jenkinsfile-runner:master
