name: Add To Project

on:
  issues:
    types:
      - opened

jobs:
  add-to-project:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/users/SEU-USUARIO/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}